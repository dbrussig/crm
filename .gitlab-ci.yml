stages:
  - verify
  - release

verify_docs_sync:
  stage: verify
  image: node:20
  variables:
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - git fetch origin "${CI_DEFAULT_BRANCH:-main}" >/dev/null 2>&1 || true
  script:
    - bash scripts/ci/check-doc-sync.sh

release_latest_macos:
  stage: release
  tags:
    - macos
    - tauri
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $TAURI_UPDATER_PUBLIC_KEY && $TAURI_SIGNING_PRIVATE_KEY'
    - when: never
  before_script:
    - npm ci
  script:
    - bash scripts/ci/release_latest_macos.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - src-tauri/target/release/bundle/macos/
      - src-tauri/target/release/bundle/dmg/
      - latest.json
